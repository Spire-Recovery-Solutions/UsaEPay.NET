name: Publish to NuGet
on:
  push:
    branches:
      - main
      - alpha

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Set Branch-Specific Variables
      id: branch_vars
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/alpha" ]]; then
          echo "version_postfix=-alpha" >> $GITHUB_ENV
        else
          echo "version_postfix=" >> $GITHUB_ENV
        fi

    - name: Build
      run: |
        cd UsaEPay.NET
        dotnet restore
        dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --project UsaEPay.NET.Tests/UsaEPay.NET.Tests.csproj --configuration Release --no-build
      env:
        API_KEY: ${{ secrets.API_KEY }}
        API_PIN: ${{ secrets.API_PIN }}
        API_URL: ${{ secrets.API_URL }}
        RANDOM_SEED: ${{ secrets.RANDOM_SEED }}

    - name: Pack
      run: |
        cd UsaEPay.NET
        dotnet pack --configuration Release --no-restore --output nupkg /p:Version=1.0.0.${{ github.run_number }}${{ env.version_postfix }}

    - name: Push to GitHub Packages
      run: |
        cd UsaEPay.NET
        dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/Spire-Recovery-Solutions/index.json --skip-duplicate
